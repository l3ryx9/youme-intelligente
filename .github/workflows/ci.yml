name: CI — Tests & Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --ci --coverage --forceExit
        env:
          EXPO_PUBLIC_FIREBASE_API_KEY: test-api-key
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: test.firebaseapp.com
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: test-project
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: test.appspot.com
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '000000000'
          EXPO_PUBLIC_FIREBASE_APP_ID: '1:000000000:web:000000'

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  lint:
    name: TypeScript & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: ESLint
        run: npm run lint
        continue-on-error: true
